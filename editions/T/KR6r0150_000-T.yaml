front:
  text: 三教平心論序三光麗天亘萬古而長耀百川到海同一味以亡名三教之興其來尚矣並行於世化成天下以迹議之而未始不異以理推之而未始不同一而三三而一不可得而親疎焉孤山圓法師曰三教如鼎缺一不可誠古今之確論也嗟乎執迹迷理者互相排斥致使先聖無為之道翻成紛諍之端良可歎也比觀靜齋學士所著一理論言簡理詳盡善盡美窮儒道之淵源啟釋門之玄閟辯析疑惑決擇是非未嘗不出於公論譬猶星之在秤輕重無差鏡之當臺妍醜難隱斯論之作良有以矣通城實堂居士吳鼎來智識超邁黨與至公黨與出史記謂言意相合而與之友善也命工繡梓以廣其傳欲使覽者如白居易張商英等唐宋諸賢察其至理直趣真際同脫塵累豈小補哉時龍集甲子秋七月上日謹序
